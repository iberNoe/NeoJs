<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoJS Counter Example</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
    #app { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
    button { padding: 0.5rem 1rem; font-size: 1rem; cursor: pointer; border: none; border-radius: 4px; background: #007aff; color: white; margin: 0 0.5rem; transition: background 0.2s; }
    button:hover { background: #0056b3; }
    h1 { margin-bottom: 1rem; color: #1c1e21; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { reactive, effect } from '../../packages/reactivity/index.js';
    import { h, mount, diff, patch } from '../../packages/renderer/index.js';

    // 1. Define reactive state
    const state = reactive({ count: 0, title: 'NeoJS Counter' });

    // 2. Initial Render
    let vnode = h('div', null, [
      h('h1', null, state.title),
      h('p', null, `Total: ${state.count}`),
      h('button', { onclick: () => state.count++ }, 'Increment'),
      h('button', { onclick: () => state.count-- }, 'Decrement')
    ]);

    // 3. Mount to DOM
    const container = document.querySelector('#app');
    mount(vnode, container);

    // 4. Reactive Update (re-run effect when state changes)
    effect(() => {
      const nextVnode = h('div', null, [
        h('h1', null, state.title),
        h('p', null, `Total: ${state.count}`),
        h('button', { onclick: () => state.count++ }, 'Increment'),
        h('button', { onclick: () => state.count-- }, 'Decrement')
      ]);

      // Apply patches
      const patches = diff(vnode, nextVnode);
      patch(vnode.el, patches);
      vnode = nextVnode;
    });
  </script>
</body>
</html>
